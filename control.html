<!DOCTYPE html>
<html>

<body style="font-family:Arial;font-size:30px">

<h2>Control Uber Eats</h2>

<div id="info"></div>

<br>

<button onclick="pedido()">+ Pedido</button>

<br><br>

<button onclick="sumar(5)">+5 €</button>
<button onclick="sumar(10)">+10 €</button>

<br><br>

<button onclick="resetear()">Reset</button>


<script>

function actualizar(){

let p=localStorage.getItem("pedidos")||0;
let d=localStorage.getItem("dinero")||0;

info.innerHTML =
"📦 "+p+" pedidos<br>💶 "+d+" €";

}

function pedido(){

let p=Number(localStorage.getItem("pedidos")||0);
localStorage.setItem("pedidos",p+1);
actualizar();

}


function sumar(x){

let d=Number(localStorage.getItem("dinero")||0);

localStorage.setItem("dinero",(d+x).toFixed(2));

actualizar();

}


function resetear(){

localStorage.clear();
actualizar();

}


actualizar();

</script>

</body>
</html>
