<!DOCTYPE html>
<html>

<body style="font-family:Arial;font-size:30px">

<h2>Control Uber Eats</h2>

<div id="info">Cargando...</div>

<br>

<button id="pedidoBtn">+ Pedido</button>

<br><br>

<button id="cincoBtn">+5 €</button>
<button id="diezBtn">+10 €</button>

<br><br>

<button id="resetBtn">Reset</button>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyBGMRtu155hDZ6uCyhGyTMxc8h373Z6zBk",
  authDomain: "sooyruslan-22845.firebaseapp.com",
  databaseURL: "https://sooyruslan-22845-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sooyruslan-22845",
  storageBucket: "sooyruslan-22845.firebasestorage.app",
  messagingSenderId: "1070434388237",
  appId: "1:1070434388237:web:5db8308bde07d611794844"
};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


async function leer(){

let snap = await get(ref(db,"contador"));

return snap.val() || {pedidos:0,dinero:0};

}


async function actualizar(){

let d = await leer();

document.getElementById("info").innerHTML =
"📦 Pedidos: " + d.pedidos +
"<br>💶 Ganado: " + d.dinero + " €";

}


document.getElementById("pedidoBtn").onclick = async ()=>{

let d = await leer();

d.pedidos++;

await set(ref(db,"contador"),d);

actualizar();

};


document.getElementById("cincoBtn").onclick = async ()=>{

let d = await leer();

d.dinero = (Number(d.dinero)+5).toFixed(2);

await set(ref(db,"contador"),d);

actualizar();

};


document.getElementById("diezBtn").onclick = async ()=>{

let d = await leer();

d.dinero = (Number(d.dinero)+10).toFixed(2);

await set(ref(db,"contador"),d);

actualizar();

};


document.getElementById("resetBtn").onclick = ()=>{

set(ref(db,"contador"),{
pedidos:0,
dinero:0
});

};


actualizar();


</script>

</body>
</html>
