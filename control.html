<!DOCTYPE html>
<html>

<body style="font-family:Arial;font-size:30px">

<h2>Control Uber Eats</h2>

<div id="info"></div>

<br>

<button onclick="pedido()">+ Pedido</button>

<br><br>

<button onclick="sumar(5)">+5 €</button>
<button onclick="sumar(10)">+10 €</button>

<br><br>

<button onclick="resetear()">Reset</button>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyBGMRtu155hDZ6uCyhGyTMxc8h373Z6zBk",
  authDomain: "sooyruslan-22845.firebaseapp.com",
  databaseURL: "https://sooyruslan-22845-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sooyruslan-22845",
  storageBucket: "sooyruslan-22845.firebasestorage.app",
  messagingSenderId: "1070434388237",
  appId: "1:1070434388237:web:5db8308bde07d611794844"
};



const app=initializeApp(firebaseConfig);

const db=getDatabase(app);


async function leer(){

let snap=await get(ref(db,"contador"));

return snap.val() || {pedidos:0,dinero:0};

}


async function pedido(){

let d=await leer();

d.pedidos++;

set(ref(db,"contador"),d);

}


async function sumar(x){

let d=await leer();

d.dinero=(Number(d.dinero)+x).toFixed(2);

set(ref(db,"contador"),d);

}


function resetear(){

set(ref(db,"contador"),{
pedidos:0,
dinero:0
});

}


</script>

</body>
</html>
