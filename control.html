<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body {
    font-family: Montserrat;
    font-size: 32px;
    text-align: center;
}

button {
    font-size: 35px;
    padding: 25px;
    margin: 12px;
    border-radius: 20px;
}

input {
    font-size: 35px;
    width: 220px;
    padding: 15px;
    text-align: center;
}

#info {
    margin: 20px;
    font-size: 40px;
}

</style>

</head>


<body>


<h2>🛵 Uber Eats Control</h2>


<div id="info">
Cargando...
</div>


<button id="pedidoBtn">
📦 + PEDIDO
</button>


<br><br>


<input 
id="cantidad"
type="number"
step="0.01"
placeholder="CHF">


<br>


<button id="dineroBtn">
💰 AÑADIR CHF
</button>


<br><br>


<button id="resetBtn">
🔄 RESET
</button>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { getDatabase, ref, get, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey: "AIzaSyBGMRtu155hDZ6uCyhGyTMxc8h373Z6zBk",

authDomain: "sooyruslan-22845.firebaseapp.com",

databaseURL: "https://sooyruslan-22845-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "sooyruslan-22845",

storageBucket: "sooyruslan-22845.firebasestorage.app",

messagingSenderId: "1070434388237",

appId: "1:1070434388237:web:5db8308bde07d611794844"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



async function leer(){

    let snap = await get(ref(db,"contador"));

    return snap.val() || {
        pedidos:0,
        dinero:0
    };

}



function formatoCHF(valor){

    return Number(valor)
    .toFixed(2)
    .replace(".", ",");
}



async function actualizar(){

    let d = await leer();


    document.getElementById("info").innerHTML =

    "📦 Pedidos: " + d.pedidos +

    "<br>💰 " + formatoCHF(d.dinero) + " CHF";

}



document.getElementById("pedidoBtn").onclick = async ()=>{


    let d = await leer();


    d.pedidos++;


    await set(ref(db,"contador"),d);


    actualizar();

};



document.getElementById("dineroBtn").onclick = async ()=>{


    let cantidad = Number(
        document.getElementById("cantidad").value
    );


    if(!cantidad) return;


    let d = await leer();


    d.dinero =
    (Number(d.dinero)+cantidad).toFixed(2);



    await set(ref(db,"contador"),d);


    document.getElementById("cantidad").value="";


    actualizar();

};




document.getElementById("resetBtn").onclick = async ()=>{


    await set(ref(db,"contador"),{

        pedidos:0,

        dinero:0

    });


    actualizar();

};



actualizar();



</script>


</body>

</html>
