<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body {

background: transparent;
color:white;
font-family:Montserrat;
font-weight:900;
font-size:45px;
text-shadow:2px 2px 5px black;

}

</style>

</head>


<body>



📦 Pedidos: <span id="pedidos">0</span><br>

💰 Ganado: <span id="dinero">0,00</span> CHF



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey: "AIzaSyBGMRtu155hDZ6uCyhGyTMxc8h373Z6zBk",

authDomain: "sooyruslan-22845.firebaseapp.com",

databaseURL: "https://sooyruslan-22845-default-rtdb.europe-west1.firebasedatabase.app",

projectId: "sooyruslan-22845",

storageBucket: "sooyruslan-22845.firebasedatabase.app",

messagingSenderId: "1070434388237",

appId: "1:1070434388237:web:5db8308bde07d611794844"

};



const app = initializeApp(firebaseConfig);


const db = getDatabase(app);



function formatoCHF(valor){

return Number(valor)
.toFixed(2)
.replace(".", ",");

}



onValue(ref(db,"contador"),(snapshot)=>{


let datos = snapshot.val() || {};


document.getElementById("pedidos").textContent =
datos.pedidos ?? 0;



document.getElementById("dinero").textContent =
formatoCHF(datos.dinero ?? 0);



});


</script>


</body>

</html>
